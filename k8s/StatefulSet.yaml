apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prestashop-statefulset
  namespace: prestashop
  labels:
    name: mysql
spec:
  selector:
    matchLabels:
      name: mysql
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: mysql
    spec:
      containers:
        - image: mysql:5.7
          name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: admin
          ports:
            - containerPort: 3306
  volumeClaimTemplates:
    - metadata:
        name: www
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "csi-hostpath-sc"
        resources:
          requests:
            storage: 1Gi
